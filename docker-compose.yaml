version: "3.8"

services:
  backend:
    build: ./backend
    container_name: solo-backend
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://solo_user:solo_pass@postgres:5432/solo_leveling}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-solo-leveling}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_SRANK_PRICE_ID: ${STRIPE_SRANK_PRICE_ID}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      BASE_URL: ${BASE_URL}
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    container_name: solo-pg
    environment:
      POSTGRES_DB: solo_leveling
      POSTGRES_USER: solo_user
      POSTGRES_PASSWORD: solo_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build: ./web
    container_name: solo-web
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
